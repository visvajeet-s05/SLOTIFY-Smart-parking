apiVersion: apps/v1
kind: Deployment
metadata:
  name: slotify-app
  namespace: slotify
  labels:
    app: slotify
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: slotify
      version: v1
  template:
    metadata:
      labels:
        app: slotify
        version: v1
    spec:
      containers:
      - name: slotify
        image: public.ecr.aws/slotify/slotify-app:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: slotify-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: slotify-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: slotify-secrets
              key: jwt-secret
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: slotify-secrets
              key: stripe-secret-key
        - name: REGION
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['region']
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      - name: sidecar-proxy
        image: envoyproxy/envoy:v1.25-latest
        ports:
        - containerPort: 9901
          name: admin
        - containerPort: 10000
          name: proxy
        env:
        - name: ENVOY_ADMIN_PORT
          value: "9901"
        - name: ENVOY_PROXY_PORT
          value: "10000"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: slotify-service
  namespace: slotify
  labels:
    app: slotify
spec:
  selector:
    app: slotify
    version: v1
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slotify-ingress
  namespace: slotify
  labels:
    app: slotify
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-timeout: "300"
spec:
  tls:
  - hosts:
    - api.slotify.com
    - api.us.slotify.com
    - api.eu.slotify.com
    - api.asia.slotify.com
    secretName: slotify-tls
  rules:
  - host: api.slotify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slotify-service
            port:
              number: 80
  - host: api.us.slotify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slotify-service
            port:
              number: 80
  - host: api.eu.slotify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slotify-service
            port:
              number: 80
  - host: api.asia.slotify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slotify-service
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: slotify-hpa
  namespace: slotify
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: slotify-app
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Min
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: slotify-pdb
  namespace: slotify
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: slotify
      version: v1
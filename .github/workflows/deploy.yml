name: CI — Build & Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://root:placeholder@localhost:3306/smartparking

      - name: Type check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: mysql://root:placeholder@localhost:3306/smartparking
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci-secret-placeholder-32-chars-ok
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
          NEXT_PUBLIC_API_URL: http://localhost:3000/api
          NEXT_PUBLIC_WEBSOCKET_URL: ws://localhost:4000
          NEXT_PUBLIC_AI_SERVICE_URL: http://localhost:5000
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          NEXT_PUBLIC_GOOGLE_MAPS_KEY: ""
          NODE_ENV: production

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: mysql://root:placeholder@localhost:3306/smartparking
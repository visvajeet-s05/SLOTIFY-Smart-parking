apiVersion: v1
kind: Service
metadata:
  name: slotify-service
  namespace: slotify
  labels:
    app: slotify
    version: v1
spec:
  selector:
    app: slotify
    version: v1
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP
  sessionAffinity: None
---

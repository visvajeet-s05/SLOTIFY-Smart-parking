apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slotify-ingress
  namespace: slotify
  labels:
    app: slotify
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  tls:
  - hosts:
    - api.slotify.com
    - api.us.slotify.com
    - api.eu.slotify.com
    - api.asia.slotify.com
    secretName: slotify-tls
  rules:
  - host: api.slotify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slotify-service
            port:
              number: 80
  - host: api.us.slotify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slotify-service
            port:
              number: 80
  - host: api.eu.slotify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slotify-service
            port:
              number: 80
  - host: api.asia.slotify.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slotify-service
            port:
              number: 80
---

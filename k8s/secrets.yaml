apiVersion: v1
kind: Secret
metadata:
  name: slotify-secrets
  namespace: slotify
  labels:
    app: slotify
type: Opaque
stringData:
  database-url: "postgresql://postgres:password@slotify-db.cluster-abc123.us-east-1.rds.amazonaws.com:5432/slotify"
  redis-url: "redis://slotify-redis.cluster-abc123.us-east-1.elasticache.amazonaws.com:6379"
  jwt-secret: "your-super-secret-jwt-key-change-this-in-production"
  stripe-secret-key: "sk_test_your_stripe_secret_key"
  stripe-publishable-key: "pk_test_your_stripe_publishable_key"
  google-maps-api-key: "your_google_maps_api_key"
  openweather-api-key: "your_openweather_api_key"
  aws-access-key-id: "your_aws_access_key_id"
  aws-secret-access-key: "your_aws_secret_access_key"
  aws-region: "us-east-1"
  slack-webhook-url: "your_slack_webhook_url"
  sentry-dsn: "your_sentry_dsn"
---

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            margin: 20px 0;
            font-size: 2.5rem;
            background: linear-gradient(135deg, #a78bfa 0%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            backdrop-filter: blur(10px);
        }
        
        .status-item {
            display: flex;
            align-items: center;
            padding: 10px;
            margin: 5px 0;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
        }
        
        .status-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            font-size: 20px;
        }
        
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .warning { color: #f59e0b; }
        .info { color: #3b82f6; }
        
        #map {
            width: 100%;
            height: 600px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2rem;
            color: #94a3b8;
        }
        
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #a78bfa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .api-key-display {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #a78bfa;
            margin-left: auto;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-left: 10px;
        }
        
        .badge-success {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        
        .badge-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ Google Maps API Test</h1>
        
        <div class="status">
            <h2 style="margin-bottom: 15px; font-size: 1.3rem;">Configuration Status</h2>
            
            <div class="status-item">
                <span class="status-icon" id="api-key-icon">⏳</span>
                <span>API Key Configured</span>
                <span class="api-key-display" id="api-key-display">Checking...</span>
            </div>
            
            <div class="status-item">
                <span class="status-icon" id="maps-loaded-icon">⏳</span>
                <span>Maps JavaScript API</span>
                <span class="badge" id="maps-loaded-badge">Loading...</span>
            </div>
            
            <div class="status-item">
                <span class="status-icon" id="map-rendered-icon">⏳</span>
                <span>Map Rendering</span>
                <span class="badge" id="map-rendered-badge">Waiting...</span>
            </div>
            
            <div class="status-item">
                <span class="status-icon info">ℹ️</span>
                <span>Test Location</span>
                <span class="api-key-display">Chennai, India (13.0827°N, 80.2707°E)</span>
            </div>
        </div>
        
        <div id="map">
            <div class="loading">
                <div class="spinner"></div>
                <p>Initializing Google Maps...</p>
            </div>
        </div>
        
        <div class="status" style="margin-top: 20px;">
            <h3 style="margin-bottom: 10px;">Console Log</h3>
            <div id="console-log" style="font-family: 'Courier New', monospace; font-size: 0.85rem; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;">
                <div style="color: #94a3b8;">Initializing test...</div>
            </div>
        </div>
    </div>
    
    <script>
        // Console logging
        function log(message, type = 'info') {
            const consoleLog = document.getElementById('console-log');
            const colors = {
                info: '#3b82f6',
                success: '#10b981',
                error: '#ef4444',
                warning: '#f59e0b'
            };
            const timestamp = new Date().toLocaleTimeString();
            consoleLog.innerHTML += `<div style="color: ${colors[type]}; margin: 2px 0;">[${timestamp}] ${message}</div>`;
            consoleLog.scrollTop = consoleLog.scrollHeight;
        }
        
        // Check API key
        const apiKey = 'AIzaSyAQ.Ab8RN6Li8fjHJbFUrJFQ0vimPnGfCD8ZKikFqnzvD-FtzhdaNQ';
        const maskedKey = apiKey.substring(0, 20) + '...' + apiKey.substring(apiKey.length - 10);
        
        document.getElementById('api-key-display').textContent = maskedKey;
        
        if (apiKey && apiKey !== 'YOUR_GOOGLE_MAPS_API_KEY_HERE') {
            document.getElementById('api-key-icon').textContent = '✅';
            document.getElementById('api-key-icon').className = 'status-icon success';
            log('API key configured: ' + maskedKey, 'success');
        } else {
            document.getElementById('api-key-icon').textContent = '❌';
            document.getElementById('api-key-icon').className = 'status-icon error';
            log('API key not configured!', 'error');
        }
        
        // Global error handler for Google Maps
        window.gm_authFailure = function() {
            log('Google Maps Authentication Failed!', 'error');
            document.getElementById('maps-loaded-icon').textContent = '❌';
            document.getElementById('maps-loaded-icon').className = 'status-icon error';
            document.getElementById('maps-loaded-badge').textContent = 'Auth Failed';
            document.getElementById('maps-loaded-badge').className = 'badge badge-error';
            
            document.getElementById('map').innerHTML = `
                <div style="padding: 40px; text-align: center; color: #ef4444;">
                    <h2>❌ Authentication Failed</h2>
                    <p style="margin-top: 10px; color: #94a3b8;">Please check your API key configuration and billing settings.</p>
                </div>
            `;
        };
        
        // Load Google Maps
        function initMap() {
            log('Initializing map...', 'info');
            
            try {
                const mapOptions = {
                    center: { lat: 13.0827, lng: 80.2707 },
                    zoom: 13,
                    styles: [
                        { elementType: "geometry", stylers: [{ color: "#0f172a" }] },
                        { elementType: "labels.text.stroke", stylers: [{ color: "#0f172a" }] },
                        { elementType: "labels.text.fill", stylers: [{ color: "#64748b" }] },
                        { featureType: "water", elementType: "geometry", stylers: [{ color: "#0c1220" }] },
                        { featureType: "road", elementType: "geometry", stylers: [{ color: "#1e293b" }] }
                    ]
                };
                
                const map = new google.maps.Map(document.getElementById('map'), mapOptions);
                
                // Add marker
                new google.maps.Marker({
                    position: { lat: 13.0827, lng: 80.2707 },
                    map: map,
                    title: 'Chennai, India',
                    animation: google.maps.Animation.DROP
                });
                
                log('Map rendered successfully!', 'success');
                document.getElementById('map-rendered-icon').textContent = '✅';
                document.getElementById('map-rendered-icon').className = 'status-icon success';
                document.getElementById('map-rendered-badge').textContent = 'Success';
                document.getElementById('map-rendered-badge').className = 'badge badge-success';
                
                document.getElementById('maps-loaded-icon').textContent = '✅';
                document.getElementById('maps-loaded-icon').className = 'status-icon success';
                document.getElementById('maps-loaded-badge').textContent = 'Loaded';
                document.getElementById('maps-loaded-badge').className = 'badge badge-success';
                
            } catch (error) {
                log('Error rendering map: ' + error.message, 'error');
                document.getElementById('map-rendered-icon').textContent = '❌';
                document.getElementById('map-rendered-icon').className = 'status-icon error';
                document.getElementById('map-rendered-badge').textContent = 'Failed';
                document.getElementById('map-rendered-badge').className = 'badge badge-error';
            }
        }
        
        // Load the Google Maps script
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${apiKey}&callback=initMap`;
        script.async = true;
        script.defer = true;
        script.onerror = function() {
            log('Failed to load Google Maps script', 'error');
            document.getElementById('maps-loaded-icon').textContent = '❌';
            document.getElementById('maps-loaded-icon').className = 'status-icon error';
            document.getElementById('maps-loaded-badge').textContent = 'Load Failed';
            document.getElementById('maps-loaded-badge').className = 'badge badge-error';
        };
        document.head.appendChild(script);
        
        log('Loading Google Maps JavaScript API...', 'info');
    </script>
</body>
</html>

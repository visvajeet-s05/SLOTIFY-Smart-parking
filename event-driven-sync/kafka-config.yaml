apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: slotify-kafka
  namespace: slotify
  labels:
    app: slotify
spec:
  kafka:
    version: 3.4.0
    replicas: 3
    listeners:
    - name: plain
      port: 9092
      type: internal
      tls: false
    - name: tls
      port: 9093
      type: internal
      tls: true
    - name: external
      port: 9094
      type: nodeport
      tls: true
    config:
      offsets.topic.replication.factor: 3
      transaction.state.log.replication.factor: 3
      transaction.state.log.min.isr: 2
      log.message.format.version: "3.4"
      inter.broker.protocol.version: "3.4"
      default.replication.factor: 3
      min.insync.replicas: 2
      auto.create.topics.enable: true
    storage:
      type: persistent-claim
      size: 100Gi
      class: gp2
    resources:
      requests:
        memory: 2Gi
        cpu: 500m
      limits:
        memory: 4Gi
        cpu: 1000m
    jvmOptions:
      -Xms: 1g
      -Xmx: 1g
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics
          key: kafka-metrics-config.yml
  zookeeper:
    replicas: 3
    storage:
      type: persistent-claim
      size: 10Gi
      class: gp2
    resources:
      requests:
        memory: 1Gi
        cpu: 250m
      limits:
        memory: 2Gi
        cpu: 500m
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: zookeeper-metrics
          key: zookeeper-metrics-config.yml
  entityOperator:
    topicOperator:
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 1Gi
          cpu: 500m
    userOperator:
      resources:
        requests:
          memory: 512Mi
          cpu: 250m
        limits:
          memory: 1Gi
          cpu: 500m
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: slotify-events
  namespace: slotify
  labels:
    strimzi.io/cluster: slotify-kafka
spec:
  partitions: 12
  replicas: 3
  config:
    retention.ms: 604800000  # 7 days
    cleanup.policy: delete
    compression.type: snappy
    max.message.bytes: 1000012
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: slotify-parking-events
  namespace: slotify
  labels:
    strimzi.io/cluster: slotify-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 259200000  # 3 days
    cleanup.policy: delete
    compression.type: snappy
    max.message.bytes: 1000012
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: slotify-booking-events
  namespace: slotify
  labels:
    strimzi.io/cluster: slotify-kafka
spec:
  partitions: 6
  replicas: 3
  config:
    retention.ms: 259200000  # 3 days
    cleanup.policy: delete
    compression.type: snappy
    max.message.bytes: 1000012
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: slotify-price-events
  namespace: slotify
  labels:
    strimzi.io/cluster: slotify-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 86400000   # 1 day
    cleanup.policy: delete
    compression.type: snappy
    max.message.bytes: 1000012
---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaTopic
metadata:
  name: slotify-payment-events
  namespace: slotify
  labels:
    strimzi.io/cluster: slotify-kafka
spec:
  partitions: 3
  replicas: 3
  config:
    retention.ms: 2592000000  # 30 days
    cleanup.policy: compact
    compression.type: snappy
    max.message.bytes: 1000012
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-metrics
  namespace: slotify
  labels:
    app: slotify
data:
  kafka-metrics-config.yml: |
    lowercaseOutputName: true
    rules:
    - pattern: kafka.server<type=(.+), name=(.+)><>Value
      name: kafka_server_$1_$2
    - pattern: kafka.server<type=(.+), name=(.+)PerSec><>Count
      name: kafka_server_$1_$2_total
    - pattern: kafka.server<type=(.+), name=(.+)PerSec><>OneMinuteRate
      name: kafka_server_$1_$2_per_sec
    - pattern: kafka.network<type=(.+), name=(.+)><>Value
      name: kafka_network_$1_$2
    - pattern: kafka.network<type=(.+), name=(.+)><>(\d+)thPercentile
      name: kafka_network_$1_$2_$3_percentile
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zookeeper-metrics
  namespace: slotify
  labels:
    app: slotify
data:
  zookeeper-metrics-config.yml: |
    lowercaseOutputName: true
    rules:
    - pattern: "org.apache.ZooKeeperService<name0=ReplicatedServer_id(\\d+)><>(\\w+)"
      name: "zookeeper_$2"
    - pattern: "org.apache.ZooKeeperService<name0=ReplicatedServer_id(\\d+), name1=replica.(\\d+)><>(\\w+)"
      name: "zookeeper_replica_$3"
    - pattern: "org.apache.ZooKeeperService<name0=ReplicatedServer_id(\\d+), name1=replica.(\\d+), name2=(\\w+)><>(\\w+)"
      name: "zookeeper_replica_$3_$4"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-service
  namespace: slotify
  labels:
    app: slotify
spec:
  selector:
    strimzi.io/name: slotify-kafka-kafka
  ports:
  - name: tls
    port: 9093
    targetPort: 9093
  - name: external
    port: 9094
    targetPort: 9094
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper-service
  namespace: slotify
  labels:
    app: slotify
spec:
  selector:
    strimzi.io/name: slotify-kafka-zookeeper
  ports:
  - name: client
    port: 2181
    targetPort: 2181
  - name: metrics
    port: 9404
    targetPort: 9404